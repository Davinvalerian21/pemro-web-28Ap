<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Javascript - Task 36 Case Study</title>
</head>
<body>

<script type="text/javascript">
    // 1. Mendeklarasikan array kosong bernama pokeballs
    var pokeballs = [];

    // 2. Membuat object untuk masing-masing Pokemon berdasarkan tabel
    var pokemon1 = {
        name: 'Pikachu',
        type: 'Electric type',
        age: 3
    };

    var pokemon2 = {
        name: 'Squirtle',
        type: 'Water type',
        age: 2
    };

    var pokemon3 = {
        name: 'Lapras',
        type: 'Water type',
        age: 4
    };

    // 3. Memasukkan ketiga object pokemon ke dalam array pokeballs
    // Menggunakan fungsi push() bawaan array
    pokeballs.push(pokemon1, pokemon2, pokemon3);

    /* 
    CARA ALTERNATIF (Lebih singkat):
    Kamu juga bisa menuliskannya langsung di dalam array seperti ini:
    
    var pokeballs = [
        { name: 'Pikachu', type: 'Electric type', age: 3 },
        { name: 'Squirtle', type: 'Water type', age: 2 },
        { name: 'Lapras', type: 'Water type', age: 4 }
    ];
    */

    // 4. Menampilkan keseluruhan isi array pokeballs di console
    console.log(pokeballs);
</script>

</body>
</html>
